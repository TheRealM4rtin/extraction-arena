services:
  backend:
    build:
      context: ./backend
    container_name: extraction-arena-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DOCLING_PYTHON_PATH=python3
      - DOCLING_MODEL=${DOCLING_MODEL:-smoldocling}
      - DOCLING_WORKER_PATH=/app/docling_worker.py
      - DOCLING_TIMEOUT_MS=600000
    volumes:
      - docling-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ZAI_API_KEY: ${VITE_ZAI_API_KEY}
        VITE_OPENAI_API_KEY: ${VITE_OPENAI_API_KEY}
    container_name: extraction-arena-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  docling-cache:
